# .github/workflows/deploy.yml
# Deploys to Google Cloud Run on every push to main, and supports manual triggers.

name: 'Deploy to Cloud Run from Source'

on:
  push:
    branches:
      - 'main'          # Fires on every push to the main branch
  workflow_dispatch:    # Adds the "Run workflow" button in the GitHub Actions UI

env:
  PROJECT_ID: 'resumetracker-497318'   # Your GCP project ID
  REGION: 'us-central1'                # Cloud Run region
  SERVICE: 'resumetracker'             # Cloud Run service name

jobs:
  deploy:
    name: 'Build and Deploy to Cloud Run'
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      # ── Step 1: Checkout source code ──────────────────────────────────────
      - name: '📥 Checkout repository'
        uses: 'actions/checkout@v4'

      # ── Step 2: Debug info (helps diagnose issues) ─────────────────────────
      - name: '🔍 Debug — Print environment info'
        run: |
          echo "=========================================="
          echo "  Workflow triggered by: ${{ github.event_name }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit SHA: ${{ github.sha }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  GCP Project: ${{ env.PROJECT_ID }}"
          echo "  Cloud Run Service: ${{ env.SERVICE }}"
          echo "  Region: ${{ env.REGION }}"
          echo "=========================================="

      # ── Step 3: Authenticate to GCP using your Service Account JSON Key ────
      - name: '🔐 Authenticate to Google Cloud'
        id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # ── Step 4: Set up the gcloud CLI ─────────────────────────────────────
      - name: '⚙️ Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          project_id: '${{ env.PROJECT_ID }}'

      # ── Step 5: Confirm gcloud is authenticated and working ────────────────
      - name: '✅ Verify gcloud authentication'
        run: |
          gcloud auth list
          gcloud config list project
          echo "Authenticated successfully to project: ${{ env.PROJECT_ID }}"

      # ── Step 6: Deploy source code directly to Cloud Run via Cloud Build ───
      # Cloud Build will automatically build a container from your source code.
      # No Dockerfile required — it uses Google's Buildpacks automatically.
      - name: '🚀 Deploy to Cloud Run'
        id: 'deploy'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          source: './'
          flags: '--allow-unauthenticated'   # Remove this if you want auth-required access

      # ── Step 7: Print the deployed URL ────────────────────────────────────
      - name: '🌐 Show deployed service URL'
        run: |
          echo "=========================================="
          echo "  ✅ Deployment successful!"
          echo "  🌐 Service URL: ${{ steps.deploy.outputs.url }}"
          echo "=========================================="
